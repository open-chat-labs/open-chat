[target.x86_64-unknown-linux-musl]
linker = "x86_64-linux-musl-gcc"

# getrandom (0.3+) no longer has a `custom` cargo feature; on wasm32-unknown-unknown it must be
# told to use a custom backend via this cfg, which routes it to the `__getrandom_v03_custom` extern
# defined in the `types` crate. Canisters never actually call getrandom (they seed their RNG from
# the IC's `raw_rand`), so that extern just traps.
[target.wasm32-unknown-unknown]
rustflags = ["--cfg", 'getrandom_backend="custom"']
