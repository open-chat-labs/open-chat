on:
  pull_request:
    branches:
      - master

name: Backend linting and unit tests

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: run fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/setup-rust
      - uses: actions-rust-lang/rustfmt@v1

  clippy:
    name: run clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/setup-rust
        with:
          cache: read
      - uses: arduino/setup-protoc@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions-rs/cargo@v1
        with:
          command: clippy
          # personhood_spike is excluded because it include_bytes!s onnx model
          # files which are gitignored (see its README + download script)
          args: --workspace --exclude personhood_spike --tests -- -D warnings

  unit_tests:
    name: run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/setup-rust
        with:
          cache: read
      - uses: actions-rs/cargo@v1
        with:
          command: test
          # personhood_spike is excluded because it include_bytes!s onnx model
          # files which are gitignored (see its README + download script)
          args: --workspace --exclude integration_tests --exclude personhood_spike
