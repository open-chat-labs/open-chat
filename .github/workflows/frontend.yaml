on:
  pull_request:
    branches:
      - master

name: Frontend linting, type check & unit tests

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  install-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Restore dependencies from cache
        uses: actions/cache/restore@v3
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          # cache: "npm"
          # cache-dependency-path: frontend/package-lock.json

      # - name: Install dependencies
      #   run: npm ci

        # This acts as a safety net if Mac-generated lockfile stripped the Linux binary
      - name: Ensure Rollup Linux Binary
        run: npm install @rollup/rollup-linux-x64-gnu

      - name: Restore Turborepo files from cache
        uses: actions/cache/restore@v3
        with:
          path: frontend/.turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build frontend
        run: npm run build:ci
        env:
          NODE_ENV: ci
          OC_USERGEEK_APIKEY: DUMMY_USERGEEK_APIKEY
          OC_ROLLBAR_ACCESS_TOKEN: DUMMY_ROLLBAR_ACCESS_TOKEN
          OC_WEBSITE_VERSION: 1.0.0
          OC_METERED_APIKEY: DUMMY_METERED_APIKEY
          OC_VAPID_PUBLIC_KEY: DUMMY_VAPID_PUBLIC_KEY

      - name: Save dependencies to cache
        if: ${{ github.ref == 'refs/heads/master' }}
        uses: actions/cache/save@v3
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}

      - name: Save Turborepo files to cache
        if: ${{ github.ref == 'refs/heads/master' }}
        uses: actions/cache/save@v3
        with:
          path: frontend/.turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
